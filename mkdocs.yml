site_name: Volta Docs
site_description: Volta documentation
repo_url: https://github.com/VoltaHQ/docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list

nav:
  - Home: index.md
  - Stellar/Soroban:
    - Overview: stellar/index.md
    - Tutorials:
      - Getting Started: stellar/tutorials/getting-started.md
      - First Proposal: stellar/tutorials/first-proposal.md
      - dApp Integration: stellar/tutorials/integration.md
    - Troubleshooting: stellar/troubleshooting.md
  - EVM (ERC-4337):
    - Overview: evm/index.md
    - Tutorials:
      - Getting Started: evm/tutorials/getting-started.md
      - Session Keys: evm/tutorials/session-keys.md
    - Troubleshooting: evm/troubleshooting.md
  - CosmWasm (Sei/Injective):
    - Overview: cosmwasm/index.md
    - Tutorials:
      - Getting Started: cosmwasm/tutorials/getting-started.md
      - Rules & Session Keys: cosmwasm/tutorials/rules.md
    - Troubleshooting: cosmwasm/troubleshooting.md
